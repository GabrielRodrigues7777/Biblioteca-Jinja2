{% extends "base.html" %}

{% block titulo %}Atualizar Livro{% endblock %}

{% block conteudo %}

    <h2 class="mb-4">Atualizar Livro</h2>

    <form action="/atualizar/{{ livro.isbn }}" method="POST">

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" class="form-control" value="{{ livro.isbn }}" disabled>
        </div>

        <div class="mb-3">
            <label>Título</label>
            <input type="text" name="titulo" class="form-control" value="{{ livro.titulo }}" required>
        </div>

        <div class="mb-3">
            <label>Autor</label>
            <input type="text" name="autor" class="form-control" value="{{ livro.autor }}" required>
        </div>

        <div class="mb-3">
            <label>Gênero</label>
            <input type="text" name="genero" class="form-control" value="{{ livro.genero }}" required>
        </div>

        <div class="mb-3">
            <label>Ano de Publicação</label>
            <input type="number" name="ano_publicacao" class="form-control" value="{{ livro.ano_publicacao }}" required>
        </div>

        <div class="mb-3">
            <label>Editora</label>
            <input type="text" name="editora" class="form-control" value="{{ livro.editora }}" required>
        </div>

        <div class="mb-3">
            <label>Páginas</label>
            <input type="number" name="paginas" class="form-control" value="{{ livro.paginas }}" required>
        </div>

        <div class="mb-3">
            <label>Localização</label>
            <input type="text" name="localizacao" class="form-control" value="{{ livro.localizacao }}" required>
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select name="status" class="form-control">
                <option value="disponivel" {% if livro.status == "disponivel" %}selected{% endif %}>Disponível</option>
                <option value="emprestado" {% if livro.status == "emprestado" %}selected{% endif %}>Emprestado</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        <a href="/" class="btn btn-secondary">Voltar</a>

    </form>

{% endblock %}
